<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Memory Workbench</title>
  <style>
    * { box-sizing: border-box; }
    body {
      margin: 0;
      font-family: ui-sans-serif, system-ui, -apple-system, "Segoe UI", sans-serif;
      background: #0f1115;
      color: #e5e7eb;
      display: grid;
      grid-template-columns: 360px 1fr 1fr;
      gap: 0;
      height: 100vh;
    }
    h1, h2, h3 { margin: 0 0 12px; font-weight: 600; }
    h1 { font-size: 18px; padding: 16px; border-bottom: 1px solid #1f2937; }
    h2 { font-size: 14px; color: #9ca3af; text-transform: uppercase; letter-spacing: .08em; }
    .col { overflow: auto; border-right: 1px solid #1f2937; padding: 16px; }
    .col:last-child { border-right: 0; }
    label { display: block; font-size: 12px; color: #9ca3af; margin: 8px 0 4px; }
    input, select, textarea, button {
      width: 100%;
      padding: 8px;
      background: #1a1f29;
      border: 1px solid #2a323f;
      color: #e5e7eb;
      border-radius: 4px;
      font-size: 13px;
      font-family: inherit;
    }
    textarea { min-height: 80px; resize: vertical; }
    button { background: #2563eb; border-color: #2563eb; cursor: pointer; font-weight: 500; }
    button:hover { background: #1d4ed8; }
    button.ghost { background: transparent; }
    .row { display: flex; gap: 8px; }
    .row > * { flex: 1; }
    .mem {
      background: #1a1f29;
      border: 1px solid #2a323f;
      border-radius: 6px;
      padding: 10px;
      margin-bottom: 8px;
      font-size: 13px;
    }
    .mem.active { border-color: #16a34a; }
    .mem.candidate { border-color: #d97706; }
    .mem.superseded { opacity: 0.55; border-style: dashed; }
    .mem.quarantined { border-color: #dc2626; }
    .mem.revoked { opacity: 0.4; border-style: dotted; }
    .meta { color: #9ca3af; font-size: 11px; margin-top: 6px; display: flex; flex-wrap: wrap; gap: 8px; }
    .meta span { background: #0f1115; padding: 2px 6px; border-radius: 3px; }
    .badge { font-size: 10px; padding: 1px 5px; border-radius: 3px; text-transform: uppercase; }
    .badge.kind { background: #1e40af; color: #dbeafe; }
    .badge.scope { background: #065f46; color: #d1fae5; }
    .trace {
      background: #1a1f29;
      border: 1px solid #2a323f;
      padding: 8px; margin-bottom: 6px;
      font-size: 12px; border-radius: 4px;
    }
    .trace pre { margin: 6px 0 0; color: #9ca3af; font-size: 11px; white-space: pre-wrap; word-break: break-all; }
    .empty { color: #6b7280; font-style: italic; font-size: 12px; padding: 8px; }
  </style>
</head>
<body>
  <div class="col" style="grid-column: 1 / 2;">
    <h1>Memory Workbench</h1>
    <h2>Propose</h2>
    <label>Content</label>
    <textarea id="content" placeholder="Project uses pnpm not npm"></textarea>
    <div class="row">
      <div>
        <label>Kind</label>
        <select id="kind">
          <option value="preference">preference</option>
          <option value="fact">fact</option>
          <option value="decision">decision</option>
          <option value="constraint">constraint</option>
          <option value="procedure">procedure</option>
          <option value="experience">experience</option>
        </select>
      </div>
      <div>
        <label>Sensitivity</label>
        <select id="sensitivity" disabled>
          <option value="normal">normal</option>
          <option value="private">private</option>
          <option value="secret">secret</option>
        </select>
      </div>
    </div>
    <div class="row">
      <div>
        <label>Subject</label>
        <input id="subject" placeholder="project:demo" />
      </div>
      <div>
        <label>Predicate</label>
        <input id="predicate" placeholder="package-manager" />
      </div>
    </div>
    <label>Value</label>
    <input id="value" placeholder="pnpm" />
    <div class="row">
      <div>
        <label>Scope level</label>
        <select id="level">
          <option value="project">project</option>
          <option value="global">global</option>
          <option value="workspace">workspace</option>
          <option value="agent">agent</option>
          <option value="session">session</option>
        </select>
      </div>
      <div>
        <label>Project ID</label>
        <input id="project_id" placeholder="demo" />
      </div>
    </div>
    <label>Client ID (caller)</label>
    <input id="client_id" placeholder="web-ui" />
    <div class="row" style="margin-top: 12px;">
      <label style="display:flex; align-items:center; gap:6px; flex: 0 0 auto;">
        <input id="auto_approve" type="checkbox" style="width:auto" checked />
        <span style="margin:0">Auto-approve (low-risk)</span>
      </label>
      <button id="propose-btn">Propose</button>
    </div>
    <div id="propose-result" class="empty"></div>

    <h2 style="margin-top:24px">Search</h2>
    <label>Query</label>
    <input id="query" placeholder="package-manager" />
    <div class="row">
      <div>
        <label>Scope level</label>
        <select id="search_level">
          <option value="project">project</option>
          <option value="global">global</option>
          <option value="workspace">workspace</option>
          <option value="agent">agent</option>
        </select>
      </div>
      <div>
        <label>Project ID</label>
        <input id="search_project_id" placeholder="demo" />
      </div>
    </div>
    <label>Client ID (caller)</label>
    <input id="search_client_id" placeholder="client-b" />
    <button id="search-btn" style="margin-top:8px">Search</button>
    <div id="search-result" class="empty"></div>
  </div>

  <div class="col">
    <h2>Memories</h2>
    <div class="row" style="margin-bottom:8px">
      <select id="filter_state">
        <option value="">all states</option>
        <option value="active">active</option>
        <option value="candidate">candidate</option>
        <option value="superseded">superseded</option>
        <option value="revoked">revoked</option>
      </select>
      <button class="ghost" id="refresh-btn">Refresh</button>
    </div>
    <div id="memories"></div>
  </div>

  <div class="col">
    <h2>Recent Traces</h2>
    <div id="traces"></div>
  </div>

  <script>
    const $ = (id) => document.getElementById(id);

    async function jsonOrError(res) {
      const text = await res.text();
      let data;
      try { data = text ? JSON.parse(text) : null; } catch { throw new Error(text); }
      if (!res.ok) throw new Error((data && data.detail) || res.statusText);
      return data;
    }

    function scopeStr(s) {
      const bits = [`level=${s.level}`];
      if (s.project_id) bits.push(`project=${s.project_id}`);
      if (s.workspace_id) bits.push(`ws=${s.workspace_id}`);
      if (s.agent_id) bits.push(`agent=${s.agent_id}`);
      if (s.session_id) bits.push(`session=${s.session_id}`);
      return bits.join(' ');
    }

    function memHtml(m) {
      return `
        <div class="mem ${m.state}">
          <div>${escapeHtml(m.content)}</div>
          ${m.subject || m.predicate || m.value ? `
            <div class="meta">
              ${m.subject ? `<span>subject: ${escapeHtml(m.subject)}</span>` : ''}
              ${m.predicate ? `<span>predicate: ${escapeHtml(m.predicate)}</span>` : ''}
              ${m.value ? `<span>value: ${escapeHtml(m.value)}</span>` : ''}
            </div>` : ''}
          <div class="meta">
            <span class="badge kind">${m.kind}</span>
            <span class="badge scope">${escapeHtml(scopeStr(m.scope))}</span>
            <span>${m.state}</span>
            <span>src: ${escapeHtml(m.source_id)}</span>
            ${m.supersedes_id ? `<span>supersedes: ${m.supersedes_id.slice(0,12)}…</span>` : ''}
          </div>
          <div style="margin-top:8px; display:flex; gap:6px">
            <button class="ghost" onclick="correctPrompt('${m.id}', '${escapeHtml(m.content).replace(/'/g, "\\'")}')">Correct</button>
            <span class="meta" style="margin:0; flex:1; text-align:right">${new Date(m.updated_at).toLocaleString()}</span>
          </div>
        </div>`;
    }

    function escapeHtml(s) {
      return String(s || '').replace(/[&<>"']/g, (c) => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c]));
    }

    function traceHtml(t) {
      return `
        <div class="trace">
          <div><strong>${escapeHtml(t.query || '(empty)')}</strong> — ${t.elapsed_ms}ms</div>
          <div class="meta">
            <span>${new Date(t.timestamp).toLocaleTimeString()}</span>
            <span>client: ${escapeHtml(t.client_id)}</span>
            <span>${escapeHtml(scopeStr(t.scope))}</span>
            <span>${t.returned_ids.length} returned / ${t.candidate_ids.length} candidates</span>
          </div>
          <pre>returned: ${t.returned_ids.map(id => id.slice(0,12)).join(', ') || '(none)'}</pre>
        </div>`;
    }

    async function loadMemories() {
      const st = $('filter_state').value;
      const url = '/api/memories?limit=200' + (st ? `&state=${st}` : '');
      const data = await jsonOrError(await fetch(url));
      $('memories').innerHTML = data.length
        ? data.map(memHtml).join('')
        : '<div class="empty">No memories yet. Propose one.</div>';
    }

    async function loadTraces() {
      const data = await jsonOrError(await fetch('/api/traces?limit=50'));
      $('traces').innerHTML = data.length
        ? data.map(traceHtml).join('')
        : '<div class="empty">No searches yet.</div>';
    }

    async function propose() {
      const body = {
        content: $('content').value,
        kind: $('kind').value,
        scope: {
          level: $('level').value,
          project_id: $('project_id').value || null,
        },
        subject: $('subject').value || null,
        predicate: $('predicate').value || null,
        value: $('value').value || null,
        auto_approve: $('auto_approve').checked,
        client_id: $('client_id').value || 'web-ui',
      };
      try {
        const res = await fetch('/api/memories', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify(body),
        });
        const m = await jsonOrError(res);
        $('propose-result').innerHTML = `<div class="mem active">Created: ${m.id} — state=${m.state}</div>`;
        $('content').value = ''; $('subject').value=''; $('predicate').value=''; $('value').value='';
        loadMemories();
      } catch (e) {
        $('propose-result').innerHTML = `<div class="mem quarantined">Error: ${escapeHtml(e.message)}</div>`;
      }
    }

    async function search() {
      const body = {
        query: $('query').value,
        scope: {
          level: $('search_level').value,
          project_id: $('search_project_id').value || null,
        },
        client_id: $('search_client_id').value || 'client-b',
      };
      try {
        const res = await fetch('/api/memories/search', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify(body),
        });
        const data = await jsonOrError(res);
        $('search-result').innerHTML = data.results.length
          ? data.results.map(r => memHtml(r.record)).join('')
          : '<div class="empty">No hits. Check scope or query.</div>';
        loadTraces();
      } catch (e) {
        $('search-result').innerHTML = `<div class="mem quarantined">Error: ${escapeHtml(e.message)}</div>`;
      }
    }

    async function correctPrompt(id, oldContent) {
      const content = prompt(`Correct memory ${id.slice(0,12)}…\nNew content:`, oldContent);
      if (content === null) return;
      const value = prompt('New value (leave blank to keep):', '');
      try {
        const res = await fetch(`/api/memories/${id}/correct`, {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({
            content,
            value: value || null,
            client_id: 'web-ui',
          }),
        });
        await jsonOrError(res);
        loadMemories();
      } catch (e) {
        alert(`Error: ${e.message}`);
      }
    }

    $('propose-btn').addEventListener('click', propose);
    $('search-btn').addEventListener('click', search);
    $('refresh-btn').addEventListener('click', () => { loadMemories(); loadTraces(); });
    $('filter_state').addEventListener('change', loadMemories);

    window.correctPrompt = correctPrompt;
    loadMemories();
    loadTraces();
  </script>
</body>
</html>
